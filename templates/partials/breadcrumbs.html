{% if breadcrumbs %}
    <nav class="breadcrumbs" aria-label="Breadcrumb">
        {% for item in breadcrumbs %}
            {% if not forloop.last %}
                <a href="{{ item.url }}">{{ item.label }}</a>
                <span class="breadcrumb-separator">/</span>
            {% else %}
                <span class="breadcrumb-current">{{ item.label }}</span>
            {% endif %}
        {% endfor %}
    </nav>
{% endif %}
